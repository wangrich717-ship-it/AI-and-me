<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我和AI这几年 - 互动叙事游戏</title>
<style>
/* === RESET & BASE === */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0f;color:#e0e0e0}

/* === PAGE SYSTEM === */
.page{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.page.active{display:flex}
.page.fade-enter{animation:pageFadeIn .6s ease forwards}
.page.fade-exit{animation:pageFadeOut .4s ease forwards}
@keyframes pageFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageFadeOut{from{opacity:1}to{opacity:0}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:-2}
.page-overlay{position:absolute;inset:0;z-index:-1;background:radial-gradient(ellipse at center,rgba(10,10,15,.93) 0%,rgba(10,10,15,.78) 35%,rgba(10,10,15,.45) 100%)}
.page-content{width:100%;max-width:780px;padding:30px 40px 60px;max-height:100vh;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative;z-index:2}
.page-content::-webkit-scrollbar{display:none}

/* === TITLE === */
#title-page .page-overlay{background:radial-gradient(ellipse at center,rgba(10,10,15,.92) 0%,rgba(10,10,15,.7) 50%,rgba(10,10,15,.4) 100%)}
.title-wrap{text-align:center;max-width:700px;padding:40px}
.title-wrap h1{font-size:3.2em;font-weight:900;letter-spacing:.1em;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.title-wrap .subtitle{font-size:1.1em;color:#94a3b8;margin-bottom:40px;line-height:1.6}

/* === BUTTONS === */
.btn{display:inline-block;padding:14px 48px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#e0e0e0;font-size:1.05em;border-radius:8px;cursor:pointer;transition:all .3s;backdrop-filter:blur(8px);font-family:inherit;letter-spacing:.05em}
.btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4);transform:translateY(-2px);box-shadow:0 8px 32px rgba(96,165,250,.15)}
.btn-primary{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.1)}
.btn-primary:hover{background:rgba(96,165,250,.2);border-color:#60a5fa}
.btn-sm{padding:10px 28px;font-size:.9em}

/* === CHAPTER SPLASH === */
.ch-splash{text-align:center}
.ch-splash .ch-tag{display:inline-block;padding:4px 16px;border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:.75em;color:#94a3b8;letter-spacing:.15em;margin-bottom:16px}
.ch-splash h2{font-size:2.2em;font-weight:800;margin-bottom:10px}
.ch-splash .ch-sub{font-size:1em;color:#64748b;margin-bottom:40px}

/* === NARRATIVE & TYPEWRITER === */
.narrative{line-height:1.9;font-size:1.02em;color:#cbd5e1;margin-bottom:24px}
.tw-line{margin-bottom:14px;min-height:1.9em}
.tw-cursor{display:inline-block;width:2px;height:1em;background:#60a5fa;animation:blink .8s infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.highlight{color:#60a5fa;font-weight:600}
.term{color:#a78bfa;font-weight:600;border-bottom:1px dashed rgba(167,139,250,.4);cursor:help;position:relative}
.term-tip{display:none;position:fixed;background:rgba(15,15,25,.97);border:1px solid rgba(167,139,250,.3);border-radius:8px;padding:12px 16px;font-size:.85em;color:#cbd5e1;width:280px;font-weight:400;line-height:1.5;z-index:1000;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.term:hover .term-tip{display:block}

/* === INTERACTION BOX === */
.ix-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px;margin:24px 0}
.ix-box h3{font-size:1.05em;font-weight:600;margin-bottom:16px;color:#e2e8f0}
.ix-hint{font-size:.85em;color:#64748b;margin-bottom:12px}

/* === CHOICES === */
.choice-list{display:flex;flex-direction:column;gap:10px}
.choice-btn{text-align:left;padding:14px 20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02);color:#cbd5e1;border-radius:8px;cursor:pointer;transition:all .3s;font-size:.95em;line-height:1.5;font-family:inherit}
.choice-btn:hover{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3);transform:translateX(4px)}
.choice-btn.selected{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.5);color:#e2e8f0}
.choice-btn.correct{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.5)}
.choice-btn.wrong{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.4)}

/* === INPUT === */
.input-area{display:flex;gap:10px;margin-top:12px}
.input-area input,.input-area textarea{flex:1;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e0e0e0;font-size:.95em;font-family:inherit;outline:none;transition:border-color .3s}
.input-area input:focus,.input-area textarea:focus{border-color:rgba(96,165,250,.5)}
.input-area textarea{min-height:100px;resize:vertical}
.input-area .btn{padding:12px 24px;flex-shrink:0}

/* === TERMINAL === */
.terminal{background:#0d1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin:16px 0}
.terminal-header{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06)}
.terminal-dot{width:10px;height:10px;border-radius:50%}
.terminal-dot.r{background:#ff5f57}.terminal-dot.y{background:#febc2e}.terminal-dot.g{background:#28c840}
.terminal-body{padding:16px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:.85em;line-height:1.7;max-height:280px;overflow-y:auto;scrollbar-width:none}
.terminal-body::-webkit-scrollbar{display:none}
.terminal-line{margin-bottom:4px}
.terminal-line .prompt-char{color:#22c55e}
.terminal-line .cmd{color:#e2e8f0}
.terminal-line .output{color:#64748b}
.terminal-line .ai-response{color:#60a5fa}
.terminal-line .error{color:#ef4444}

/* === WHACK GRID === */
.whack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.whack-hole{min-height:60px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;padding:8px}
.whack-hole:active{transform:scale(.95)}
.whack-hole.hit{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4)}
.whack-hole.miss{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.4)}

/* === DRAG & DROP === */
.drag-source{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;justify-content:center}
.drag-item{padding:10px 18px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);border-radius:6px;cursor:grab;font-size:.88em;user-select:none;transition:all .2s}
.drag-item:active{cursor:grabbing;opacity:.7}
.drag-item.dragging{opacity:.4}
.drag-item.placed{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);cursor:default}
.drop-zone{display:flex;flex-direction:column;gap:8px}
.drop-slot{min-height:44px;border:2px dashed rgba(255,255,255,.1);border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:10px;transition:all .3s;font-size:.88em}
.drop-slot .slot-label{color:#64748b;font-size:.85em;flex-shrink:0;width:70px}
.drop-slot .slot-content{flex:1;min-height:24px;border-radius:4px}
.drop-slot.over{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.05)}
.drop-slot.filled{border-color:rgba(34,197,94,.3);border-style:solid}
.drop-slot.wrong-slot{border-color:rgba(239,68,68,.4)}

/* === PIPELINE BUILDER === */
.pipeline{display:flex;flex-direction:column;gap:0;margin:16px 0;position:relative}
.pipe-step{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:8px;margin-bottom:8px;background:rgba(255,255,255,.02);transition:all .3s}
.pipe-step.active-step{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.05)}
.pipe-step.done-step{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.03)}
.pipe-arrow{text-align:center;color:#475569;font-size:.8em;margin:-4px 0 4px 0}
.pipe-step-num{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.75em;flex-shrink:0;color:#64748b}
.pipe-step.done-step .pipe-step-num{border-color:rgba(34,197,94,.5);color:#22c55e}

/* === RESULT & REFLECTION === */
.result-panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px;margin:20px 0;text-align:center}
.result-panel .score{font-size:2.5em;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-panel .score-label{font-size:.85em;color:#64748b;margin-top:4px}
.reflection-box{background:linear-gradient(135deg,rgba(96,165,250,.05),rgba(167,139,250,.05));border:1px solid rgba(167,139,250,.15);border-radius:12px;padding:24px;margin:20px 0;font-style:italic;color:#94a3b8;line-height:1.8}

/* === SLIDER === */
.slider-container{margin:16px 0}
.slider-container label{font-size:.9em;color:#cbd5e1;display:block;margin-bottom:6px}
.slider-container input[type=range]{width:100%;-webkit-appearance:none;height:6px;background:rgba(255,255,255,.1);border-radius:3px;outline:none}
.slider-container input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#60a5fa;border-radius:50%;cursor:pointer;box-shadow:0 0 10px rgba(96,165,250,.4)}
.slider-label{display:flex;justify-content:space-between;font-size:.8em;color:#64748b;margin-top:6px}

/* === PUZZLE CELL === */
.puzzle-cell{padding:12px;text-align:center;border:1px solid rgba(255,255,255,.1);border-radius:8px;cursor:pointer;transition:all .3s;font-size:.9em;background:rgba(255,255,255,.02)}
.puzzle-cell:hover{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3)}
.puzzle-cell.matched{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);pointer-events:none}

/* === DIALOGUE === */
.dialogue-box{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;margin:16px 0}
.dialogue-msg{display:flex;gap:12px;margin-bottom:12px;opacity:0;animation:fadeInUp .4s forwards}
.dialogue-msg.ai{flex-direction:row}
.dialogue-msg.human{flex-direction:row-reverse}
.dialogue-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8em;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.dialogue-msg.ai .dialogue-avatar{background:rgba(96,165,250,.15);color:#60a5fa}
.dialogue-msg.human .dialogue-avatar{background:rgba(167,139,250,.15);color:#a78bfa}
.dialogue-bubble{padding:12px 16px;border-radius:10px;font-size:.92em;line-height:1.6;max-width:75%}
.dialogue-msg.ai .dialogue-bubble{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.12)}
.dialogue-msg.human .dialogue-bubble{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.12)}

/* === TIMELINE === */
.timeline{position:relative;padding-left:24px;margin:16px 0}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.08)}
.timeline-item{position:relative;margin-bottom:16px;padding-left:16px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:6px;width:10px;height:10px;border-radius:50%;border:2px solid #60a5fa;background:#0a0a0f}
.timeline-item .tl-label{font-size:.8em;color:#60a5fa;margin-bottom:2px;font-weight:600}
.timeline-item .tl-text{font-size:.9em;color:#94a3b8;line-height:1.5}

/* === BREATH === */
.breath-circle{width:120px;height:120px;border-radius:50%;border:2px solid rgba(96,165,250,.3);margin:40px auto;display:flex;align-items:center;justify-content:center;font-size:.85em;color:#60a5fa;transition:all 4s ease-in-out}
.breath-circle.inhale{transform:scale(1.5);border-color:rgba(96,165,250,.6);box-shadow:0 0 40px rgba(96,165,250,.15);margin:60px auto}
.breath-circle.exhale{transform:scale(1);border-color:rgba(96,165,250,.2);margin:40px auto}

/* === SETTINGS === */
.settings-bar{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;gap:8px}
.settings-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(10,10,15,.8);color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(8px);font-size:.85em}
.settings-btn:hover{background:rgba(255,255,255,.08);color:#e0e0e0}
.volume-popup{position:fixed;bottom:70px;right:20px;background:rgba(15,15,25,.95);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:16px;z-index:200;display:none;backdrop-filter:blur(12px);width:200px}
.volume-popup.show{display:block}
.volume-popup label{font-size:.8em;color:#94a3b8;display:block;margin-bottom:6px}
.volume-popup input[type=range]{width:100%;margin-bottom:12px}

/* === PROGRESS === */
.progress-bar-container{position:fixed;top:0;left:0;right:0;height:3px;z-index:300;background:rgba(255,255,255,.05)}
.progress-bar{height:100%;background:linear-gradient(90deg,#60a5fa,#a78bfa);transition:width .5s ease;width:0}

/* === NAV === */
.page-nav{display:flex;justify-content:space-between;align-items:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
.nav-hint{font-size:.8em;color:#475569}

/* === SCANLINE & PARTICLES === */
.page::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);pointer-events:none;z-index:0}
#particles{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.35}

/* === MOBILE === */
@media(max-width:768px){
.title-wrap h1{font-size:2em}
.page-content{padding:20px 20px 50px}
.ch-splash h2{font-size:1.5em}
}
/* === ASSESSMENT === */
.assess-cards-section{margin:12px 0}
.ac-row-label{font-size:.72em;color:#64748b;letter-spacing:.1em;margin-bottom:8px;margin-top:14px}
.ac-row{display:flex;gap:8px}
.a-card{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 6px;text-align:center;transition:all .5s;cursor:default}
.a-card.privilege{border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.05)}
.a-card.ability{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05)}
.a-card.active.privilege{box-shadow:0 0 18px rgba(245,158,11,.4);border-color:rgba(245,158,11,.7);transform:translateY(-3px)}
.a-card.active.ability{box-shadow:0 0 18px rgba(34,197,94,.4);border-color:rgba(34,197,94,.7);transform:translateY(-3px)}
.a-card.lost{filter:grayscale(1);opacity:.28;transform:scale(.93)}
.a-card.kept-flash.privilege{animation:kfP .6s ease}
.a-card.kept-flash.ability{animation:kfA .6s ease}
@keyframes kfP{0%,100%{transform:translateY(0)}40%{transform:translateY(-5px);box-shadow:0 0 24px rgba(245,158,11,.5)}}
@keyframes kfA{0%,100%{transform:translateY(0)}40%{transform:translateY(-5px);box-shadow:0 0 24px rgba(34,197,94,.5)}}
.a-card-icon{font-size:1.3em;margin-bottom:3px}
.a-card-label{font-size:.68em;color:#94a3b8;line-height:1.3}
.assess-terminal{background:#0d1117;border:1px solid rgba(239,68,68,.3);border-radius:10px;overflow:hidden;margin:16px 0}
.assess-terminal .at-head{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(239,68,68,.06);border-bottom:1px solid rgba(239,68,68,.15)}
.assess-terminal .at-dot{width:8px;height:8px;border-radius:50%;background:#ef4444}
.assess-terminal .at-title{font-size:.72em;color:#ef4444;letter-spacing:.1em;font-family:monospace}
.assess-terminal .at-body{padding:12px 16px;font-family:monospace;font-size:1.1em;line-height:1.7;color:#cbd5e1}
.assess-counter{display:flex;gap:16px;justify-content:center;margin:10px 0}
.assess-counter span{font-size:.78em;padding:4px 14px;border:1px solid rgba(255,255,255,.08);border-radius:20px;color:#64748b}
.assess-round{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;margin:12px 0}
.ar-type{font-size:.94em;letter-spacing:.1em;margin-bottom:10px}
.assess-opts{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.assess-opt{text-align:left;padding:12px 18px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02);color:#cbd5e1;border-radius:8px;cursor:pointer;transition:all .25s;font-size:1.05em;line-height:1.5;font-family:inherit}
.assess-opt:not(:disabled):hover{transform:translateX(4px)}
.assess-opt.keep-opt:not(:disabled):hover{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.35)}
.assess-opt.lose-opt:not(:disabled):hover{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.3)}
.assess-opt:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
<div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
<canvas id="particles"></canvas>
<div class="settings-bar">
<button class="settings-btn" id="soundToggle" title="Sound">SND</button>
<button class="settings-btn" id="volumeBtn" title="Volume">VOL</button>
</div>
<div class="volume-popup" id="volumePopup">
<label>BGM</label><input type="range" id="bgmVolume" min="0" max="100" value="30">
<label>SFX</label><input type="range" id="sfxVolume" min="0" max="100" value="50">
</div>

<!-- TITLE -->
<div class="page active" id="title-page">
<div class="page-bg" style="background-image:url('assets/title_bg.png')"></div>
<div class="page-overlay"></div>
<div class="title-wrap" style="z-index:2">
<h1>我和AI这几年</h1>
<p class="subtitle">从GPT-3.5到OpenClaw，从轻视到共生<br>一段关于人类与AI共同进化的互动叙事</p>
<button class="btn btn-primary" onclick="G.start()">开始旅程</button>
<div style="margin-top:16px"><button class="btn btn-sm" onclick="G.showIntro()">游戏说明</button></div>
</div>
</div>

<!-- INTRO -->
<div class="page" id="intro-page">
<div class="page-bg" style="background-image:url('assets/title_bg.png')"></div>
<div class="page-overlay" style="background:radial-gradient(ellipse at center,rgba(10,10,15,.95) 0%,rgba(10,10,15,.8) 50%,rgba(10,10,15,.5) 100%)"></div>
<div class="page-content" style="z-index:2">
<div class="ch-splash"><div class="ch-tag">游戏说明</div><h2 style="font-size:1.6em;color:#e2e8f0">关于这个游戏</h2></div>
<div class="narrative" style="margin-top:24px">
<p>你将扮演一位普通的科技从业者，亲历AI从"玩具"到"伙伴"再到"威胁"最后走向"共生"的完整旅程。</p>
<p>游戏共<span class="highlight">7个章节</span>，每个章节对应AI发展的一个关键时期。你需要完成各种互动任务：写prompt、搭工作流、消灭幻觉、体验vibe coding、面对AI对人类价值的挑战。</p>
<p>鼠标悬停在<span class="term">紫色术语<span class="term-tip">像这样就能看到术语解释</span></span>上可以查看解释。每个选择都会影响你的"AI认知指数"，最终决定你的结局。</p>
<p>这不仅是一个游戏，更是一面镜子 -- 照见我们在AI时代的真实处境。</p>
</div>
<div class="page-nav"><span></span><button class="btn" onclick="G.go('title-page')">返回</button></div>
</div>
</div>

<!-- dynamic pages injected here -->
<div id="dynamic-pages"></div>

<script>
// ===================== AUDIO ENGINE =====================
class Audio {
  constructor(){this.ctx=null;this.on=true;this.bgmVol=.39;this.sfxVol=.5;this.bgmNodes=[];this.bgmGain=null}
  init(){if(this.ctx)return;this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.bgmGain=this.ctx.createGain();this.bgmGain.gain.value=this.bgmVol;this.bgmGain.connect(this.ctx.destination)}
  _resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()}
  playBgm(ci){
    this.init();this._resume();this.stopBgm();
    // Richer ambient pads with multiple detuned oscillators
    const chords=[[130.8,164.8,196],[146.8,185,220],[164.8,196,246.9],[174.6,220,261.6],[110,138.6,164.8],[98,123.5,146.8],[130.8,164.8,196,246.9],[130.8,164.8,196]];
    const freqs=chords[ci]||chords[0];
    // Main pad layer
    freqs.forEach((f,i)=>{
      [-4,-1,0,2,5].forEach(detune=>{
        const o=this.ctx.createOscillator(),g=this.ctx.createGain();
        o.type='sine';o.frequency.value=f;o.detune.value=detune;
        g.gain.value=0;g.gain.linearRampToValueAtTime(.018/freqs.length,this.ctx.currentTime+4);
        o.connect(g);g.connect(this.bgmGain);o.start();this.bgmNodes.push(o);
      });
      // Sub octave
      const sub=this.ctx.createOscillator(),sg=this.ctx.createGain();
      sub.type='sine';sub.frequency.value=f/2;sg.gain.value=0;
      sg.gain.linearRampToValueAtTime(.025/freqs.length,this.ctx.currentTime+3);
      sub.connect(sg);sg.connect(this.bgmGain);sub.start();this.bgmNodes.push(sub);
    });
    // LFO volume modulation for breathing feel
    const lfo=this.ctx.createOscillator(),lfoG=this.ctx.createGain();
    lfo.type='sine';lfo.frequency.value=.08;lfoG.gain.value=.004;
    lfo.connect(lfoG);lfoG.connect(this.bgmGain.gain);lfo.start();this.bgmNodes.push(lfo);
    // Filtered noise for warmth
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*4,this.ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const ns=this.ctx.createBufferSource();ns.buffer=buf;ns.loop=true;
    const nf=this.ctx.createBiquadFilter();nf.type='lowpass';nf.frequency.value=300;nf.Q.value=0.7;
    const ng=this.ctx.createGain();ng.gain.value=.03;
    ns.connect(nf);nf.connect(ng);ng.connect(this.bgmGain);ns.start();this.bgmNodes.push(ns);
  }
  stopBgm(){try{this.bgmNodes.forEach(n=>n.stop())}catch(e){}this.bgmNodes=[]}
  _tone(freq,type,vol,dur,ramp){
    if(!this.on)return;this.init();
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.value=freq;
    if(ramp)o.frequency[ramp[0]](ramp[1],this.ctx.currentTime+ramp[2]);
    g.gain.value=vol*this.sfxVol;g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+dur);
    o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+dur);
  }
  click(){this._tone(600,'sine',.15,.1,['exponentialRampToValueAtTime',400,.08])}
  success(){if(!this.on)return;this.init();[523,659,784].forEach((f,i)=>{const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=0;g.gain.linearRampToValueAtTime(this.sfxVol*.12,this.ctx.currentTime+i*.12+.02);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+i*.12+.4);o.connect(g);g.connect(this.ctx.destination);o.start(this.ctx.currentTime+i*.12);o.stop(this.ctx.currentTime+i*.12+.4)})}
  error(){this._tone(200,'square',.08,.25,['linearRampToValueAtTime',150,.2])}
  transition(){this._tone(220,'sine',.1,.8,['exponentialRampToValueAtTime',880,.6])}
  typeKey(){if(!this.on)return;this.init();this._resume();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.value=800+Math.random()*400;g.gain.value=this.sfxVol*.035;g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+.04);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+.04)}
  whack(){this._tone(300,'square',.15,.15,['exponentialRampToValueAtTime',80,.15])}
  reveal(){if(!this.on)return;this.init();[330,392,494,587].forEach((f,i)=>{const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=0;g.gain.linearRampToValueAtTime(this.sfxVol*.08,this.ctx.currentTime+i*.1+.01);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+i*.1+.5);o.connect(g);g.connect(this.ctx.destination);o.start(this.ctx.currentTime+i*.1);o.stop(this.ctx.currentTime+i*.1+.5)})}
  breath(){if(!this.on)return;this.init();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.value=174;g.gain.value=0;g.gain.linearRampToValueAtTime(this.sfxVol*.06,this.ctx.currentTime+2);g.gain.linearRampToValueAtTime(0,this.ctx.currentTime+4);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+4)}
  setVol(t,v){if(t==='bgm'){this.bgmVol=v;if(this.bgmGain)this.bgmGain.gain.value=v}else this.sfxVol=v}
  toggle(){this.on=!this.on;if(this.bgmGain)this.bgmGain.gain.value=this.on?this.bgmVol:0;return this.on}
}

const G={
  awareness:0, chIdx:0, pageCounter:0,
  // --- Page Management ---
  _mkPage(bgImg){
    const id='dp-'+(this.pageCounter++);
    const div=document.createElement('div');div.className='page';div.id=id;
    div.innerHTML=`<div class="page-bg" style="background-image:url('${bgImg}')"></div><div class="page-overlay"></div><div class="page-content" style="z-index:2" id="${id}-c"></div>`;
    document.getElementById('dynamic-pages').appendChild(div);

  },
  go(id){
    sfx.transition();

    if(this._goTimer){clearTimeout(this._goTimer);this._goTimer=null}
    // Remove active/animation from ALL pages first
    document.querySelectorAll('.page.active,.page.fade-exit').forEach(p=>{
      p.classList.remove('active','fade-exit','fade-enter');
    });
    const next=document.getElementById(id);
    if(!next)return;

    this._goTimer=setTimeout(()=>{
      next.classList.add('active','fade-enter');

  addAw(n){this.awareness=Math.min(100,Math.max(0,this.awareness+n))},
  updProgress(){document.getElementById('progressBar').style.width=((this.chIdx+1)/CHAPS.length*100)+'%'},

  // --- Typewriter ---
  typewrite(container, texts, callback){
    let ti=0;
    const _scroll=()=>{const pc=container.closest('.page-content');if(pc)pc.scrollTop=pc.scrollHeight};
    const nextText=()=>{
      if(ti>=texts.length){if(callback)callback();return}
      const raw=texts[ti].html;
      // If it's a reflection-box, insert it directly and type inside
      const isBox=raw.startsWith('<div class="reflection-box">');
      let p;
      if(isBox){
        const wrapper=document.createElement('div');wrapper.innerHTML=raw;
        p=wrapper.firstChild;p.textContent='';container.appendChild(p);
        // Extract text content from raw html inside the box
        const tmp=document.createElement('div');tmp.innerHTML=raw;
        const plainText=tmp.textContent||tmp.innerText;
        const chars=[...plainText];
        let ci=0;const cursor=document.createElement('span');cursor.className='tw-cursor';p.appendChild(cursor);
        const tick=()=>{
          if(ci>=chars.length){cursor.remove();p.innerHTML=raw.replace(/^<div class="reflection-box">/,'').replace(/<\/div>$/,'');ti++;_scroll();setTimeout(nextText,300);return}
          cursor.insertAdjacentText('beforebegin',chars[ci]);sfx.typeKey();ci++;_scroll();setTimeout(tick,83);
        };tick();
      }else{
        p=document.createElement('div');p.className='tw-line';container.appendChild(p);
        const tokens=this._tokenize(raw);
        let ci=0;const cursor=document.createElement('span');cursor.className='tw-cursor';p.appendChild(cursor);
        const tick=()=>{
          if(ci>=tokens.length){cursor.remove();p.innerHTML=raw;ti++;_scroll();setTimeout(nextText,300);return}
          const tk=tokens[ci];
          if(tk.tag){cursor.insertAdjacentHTML('beforebegin',tk.raw);ci++;tick();}
          else{cursor.insertAdjacentHTML('beforebegin',tk.raw);sfx.typeKey();ci++;_scroll();setTimeout(tick,83);}
        };
        tick();
      }
    };
    nextText();
  },
  _tokenize(html){
    const tokens=[];let i=0;
    while(i<html.length){
      if(html[i]==='<'){
        // Check if this is a term-tip span - treat entire tooltip as single instant token
        const tipStart='<span class="term-tip">';
        if(html.slice(i,i+tipStart.length)===tipStart){
          const closeTag='</span>';
          let depth=1;let j=i+tipStart.length;
          while(j<html.length&&depth>0){
            if(html.slice(j,j+6)==='<span '){depth++;j+=6;}
            else if(html.slice(j,j+7)===closeTag){depth--;if(depth>0)j+=7;else j+=7;}
            else j++;
          }
          tokens.push({tag:true,raw:html.slice(i,j)});i=j;
        }else{
          let j=html.indexOf('>',i);if(j===-1)j=html.length-1;
          tokens.push({tag:true,raw:html.slice(i,j+1)});i=j+1;
        }
      }else if(html[i]==='&'){
        let j=html.indexOf(';',i);if(j===-1)j=i;
        tokens.push({tag:false,raw:html.slice(i,j+1)});i=j+1;
      }else{tokens.push({tag:false,raw:html[i]});i++;}
    }
    return tokens;
  },

        document.getElementById('ch7-a1').innerHTML=`<div class="ix-box"><h3>正念呼吸：暂停，感受此刻</h3><p class="ix-hint">跟随圆圈的节奏，深呼吸三次。</p><div class="breath-circle" id="ch7-bc">准备</div><div style="text-align:center;margin-top:8px"><button class="btn" onclick="CH[6].breathe()">开始呼吸</button></div></div>`;
      });
    },400);
  },
  breathe(){
    const bc=document.getElementById('ch7-bc');let n=0;
    const cycle=()=>{
      if(n>=3){bc.textContent='...';bc.className='breath-circle';sfx.reveal();G.addAw(5);setTimeout(()=>this.rebuild(),800);return}
      bc.textContent='吸气...';bc.className='breath-circle inhale';sfx.breath();
      setTimeout(()=>{bc.textContent='呼气...';bc.className='breath-circle exhale';n++;setTimeout(cycle,4000)},4000);
    };cycle();
  },
  rebuild(){
    const pg=G._mkPage(CHAPS[6].bg);
    pg.content.innerHTML=`<div class="reflection-box">你有多久没有这样安静地呼吸了? 在AI加速一切的时代，"慢下来"本身就是一种抵抗。</div><div class="narrative" style="margin-top:16px"><p>你开始重建自己的核心能力：</p></div><div class="timeline"><div class="timeline-item"><div class="tl-label">${G.T('深度工作')}</div><div class="tl-text">每天2小时无AI深度思考，重新训练独立推理能力</div></div><div class="timeline-item"><div class="tl-label">${G.T('具身认知')}</div><div class="tl-text">接触真实世界 -- 手工、运动、自然。AI暂时还无法替代身体的智慧</div></div><div class="timeline-item"><div class="tl-label">${G.T('数字正念')}</div><div class="tl-text">有意识地选择何时使用AI、何时独立思考。你是主人，不是附庸</div></div><div class="timeline-item"><div class="tl-label">${G.T('人机共生')}</div><div class="tl-text">AI负责规模化和效率，你负责方向、价值判断和创造性直觉</div></div></div>${G.navHtml('准备好了 &rarr;','CH[6].assess()')}`;
    G.go(pg.id);
  },
  letter(){
    sfx.click();
    const pg=G._mkPage(CHAPS[6].bg);
    pg.content.innerHTML='<div class="narrative" id="ch7-tw2"></div><div id="ch7-a2" style="display:none"></div>';
    G.go(pg.id);
    setTimeout(()=>{
      G.typewrite(document.getElementById('ch7-tw2'),[
        {html:'写一封信给半年后的自己。'},
        {html:'半年后的世界，AI会更强大。那时的你，希望自己是什么样子?'},
        {html:'这次，请你自己写 -- 不要让AI帮你。'},
      ],()=>{
        document.getElementById('ch7-a2').style.display='block';
        document.getElementById('ch7-a2').innerHTML=`<div class="ix-box"><h3>致半年后的自己</h3><div class="input-area"><textarea id="ch7-lt" placeholder="半年后的我..."></textarea></div><button class="btn" style="margin-top:10px" onclick="CH[6].send()">封存这封信</button></div>`;
      });
    },400);
  },
  assess(){
    sfx.click();
    const pg=G._mkPage(CHAPS[6].bg);
    const twEl=document.createElement('div');twEl.className='narrative';
    const bodyEl=document.createElement('div');bodyEl.style.display='none';
    pg.content.appendChild(twEl);pg.content.appendChild(bodyEl);
    CH[6]._bodyEl=bodyEl;
    G.go(pg.id);
    CH[6]._as={pk:0,ak:0,lost:[]};
    setTimeout(()=>{
      G.typewrite(twEl,[
        {html:'就在你准备重建自己的时候——'},
        {html:'一道冷光扫过屏幕。'},
      ],()=>{
        twEl.style.display='none';
        bodyEl.style.display='block';
        bodyEl.innerHTML=`<div class="assess-terminal"><div class="at-head"><div class="at-dot"></div><span class="at-title">AI SYSTEM — CAPABILITY ASSESSMENT v3.1</span></div><div class="at-body ass-ai-msg">正在扫描人类能力图谱...</div></div><div class="assess-round ass-q" style="display:none"></div>`;
        const pc=bodyEl.closest('.page-content');if(pc)pc.scrollTop=0;
        setTimeout(()=>CH[6]._assessRound(0),900);
      });
    },400);
  },
  _AD:[
    {id:'mistake',t:'p',l:'犯错的自由',i:'⚡',ai:'检测到决策错误率 23%。建议接入纠错模块。',k:'错误也是我的一部分，我拒绝修复。',lo:'可以，帮我减少错误。'},
    {id:'create',t:'a',l:'创造力',i:'✦',ai:'我每秒生成 10,000 个方案，已覆盖所有可能性。你的创意有何不同？',k:'我的创意来自我走过的路、爱过的人，那不在你的训练集里。',lo:'AI方案质量更高，我来筛选就好。'},
    {id:'bored',t:'p',l:'无聊的权利',i:'○',ai:'检测到每日效率损耗约 47 分钟。建议填充优质内容。',k:'那 47 分钟是我最后的空白，我要留着。',lo:'好，帮我填满那段时间。'},
    {id:'empathy',t:'a',l:'共情',i:'◈',ai:'已分析 300 万段对话，情感回应准确率 94%。我可以替你倾听。',k:'共情不是准确率，是我把自己的伤递给你。',lo:'94% 已够用，而且不会疲惫。'},
    {id:'contra',t:'p',l:'矛盾的权利',i:'∿',ai:'检测到自我陈述不一致性。建议建立稳定人格模型。',k:'我的矛盾就是我。',lo:'一致性更有说服力，帮我优化。'},
    {id:'meaning',t:'a',l:'意义判断',i:'◎',ai:'我可以优化任何目标函数。请输入你的人生目标。',k:'意义不是输入进去的，是我用每一个选择换来的。',lo:'帮我找到最优人生路径。'},
    {id:'aesth',t:'a',l:'审美',i:'◇',ai:'我已学习人类全部审美史，生成内容满意度 91%。你的审美判断还有必要吗？',k:'美不是满意度，是某个瞬间只属于我的颤动。',lo:'91% 满意度已经足够，AI审美更高效。'},
  ],
  _renderCards(){
    const el=CH[6]._bodyEl;
    const c=el.querySelector('.ass-cards');
    const priv=CH[6]._AD.filter(d=>d.t==='p');
    const abil=CH[6]._AD.filter(d=>d.t==='a');
    const mkCard=d=>`<div class="a-card ${d.t==='p'?'privilege':'ability'} ac-${d.id}"><div class="a-card-icon">${d.i}</div><div class="a-card-label">${d.l}</div></div>`;
    c.innerHTML=`<div class="ac-row-label">▲ 你的权利</div><div class="ac-row">${priv.map(mkCard).join('')}</div><div class="ac-row-label">★ 你的力量</div><div class="ac-row">${abil.map(mkCard).join('')}</div>`;
  },
  _assessRound(r){
    const el=CH[6]._bodyEl;
    const d=CH[6]._AD[r];
    el.querySelector('.ass-ai-msg').textContent=`[第 ${r+1} / 7 轮]  ${d.ai}`;
    const q=el.querySelector('.ass-q');
    q.style.display='block';
    const rTag=d.t==='p'?'<div class="ar-type" style="color:#f59e0b">▲ 特权防御</div>':'<div class="ar-type" style="color:#22c55e">★ 能力确认</div>';
    const bK=`<button class="assess-opt keep-opt" onclick="CH[6]._assessChoose(true,'${d.id}','${d.t}',${r})">${d.k}</button>`;
    const bL=`<button class="assess-opt lose-opt" onclick="CH[6]._assessChoose(false,'${d.id}','${d.t}',${r})">${d.lo}</button>`;
    const btns=Math.random()<0.5?bK+bL:bL+bK;
    q.innerHTML=`${rTag}<div class="assess-opts">${btns}</div>`;
    const pc=el.closest('.page-content');if(pc)pc.scrollTop=0;
    sfx.reveal();
  },
  _assessChoose(kept,id,type,r){
    sfx.click();
    const el=CH[6]._bodyEl;
    el.querySelectorAll('.assess-opt').forEach(b=>b.disabled=true);
    const d=CH[6]._AD.find(x=>x.id===id);
    const msg=el.querySelector('.ass-ai-msg');
    if(kept){
      if(type==='p')CH[6]._as.pk++;else CH[6]._as.ak++;
      msg.innerHTML=`<span style="color:#22c55e">✓ ${d.l} — 已保留</span>`;
    }else{
      CH[6]._as.lost.push(id);
      sfx.error();
      msg.innerHTML=`<span style="color:#ef4444">✗ ${d.l} — 已移交</span>`;
    }
    if(r+1>=7)setTimeout(()=>CH[6]._assessResult(),1000);
    else setTimeout(()=>CH[6]._assessRound(r+1),900);
  },
  _assessResult(){
    const {pk,ak}=CH[6]._as;const kept=pk+ak;
    let title,sub;
    if(pk>=2&&ak>=3){title='评估失败。你是个完整的人。';sub='你的不可预测性超出建模范围。无法完成接管。';}
    else if(pk>=2&&ak<2){title='你守住了混乱，却忘了混乱里有多少宝藏。';sub='你允许自己不完美，但那些闪光的能力——你让AI拿走了。';}
    else if(pk<2&&ak>=3){title='你知道自己有什么，却忘了允许自己不完美。';sub='你的创造力和共情还在，但你失去了犯错和无聊的权利。';}
    else if(kept===0){title='同化完成——';sub='';}
    else{title='评估完成。部分整合中。';sub='你仍有残余变量。继续守护它们。';}
    G.addAw(kept*2-4);
    const lostIds=CH[6]._as.lost;
    const keptLabels=CH[6]._AD.filter(d=>!lostIds.includes(d.id)).map(d=>d.l).join(' &nbsp;·&nbsp; ');
    const lostLabels=CH[6]._AD.filter(d=>lostIds.includes(d.id)).map(d=>d.l).join(' &nbsp;·&nbsp; ');
    const listHtml=`<div style="margin-top:12px;font-size:0.82em;line-height:2;opacity:0.9">${keptLabels?`<div style="color:#22c55e">✓ 你保留了：${keptLabels}</div>`:''  }${lostLabels?`<div style="color:#ef4444">✗ 你移交了：${lostLabels}</div>`:''}</div>`;
    const pg=G._mkPage(CHAPS[6].bg);
    if(kept===0){
      pg.content.innerHTML=`<div class="assess-terminal"><div class="at-head"><div class="at-dot"></div><span class="at-title">ASSESSMENT COMPLETE</span></div><div class="at-body">同化率: 100%<br>欢迎成为数字原住民。${listHtml}</div></div><div id="ass-reveal" style="display:none"><div class="reflection-box" style="margin-top:24px">但你刚才做了一个选择。<br><br>那个选择，是你的。</div>${G.navHtml('写一封信 &rarr;','CH[6].letter()')}</div>`;
      G.go(pg.id);sfx.error();
      setTimeout(()=>{document.getElementById('ass-reveal').style.display='block';sfx.reveal();},2000);
    }else{
      pg.content.innerHTML=`<div class="assess-terminal"><div class="at-head"><div class="at-dot"></div><span class="at-title">ASSESSMENT COMPLETE — 人类剩余: ${kept}/7</span></div><div class="at-body">${title}${listHtml}</div></div><div class="reflection-box" style="margin-top:16px">${sub}</div>${G.navHtml('写一封信 &rarr;','CH[6].letter()')}`;
      G.go(pg.id);sfx.reveal();
    }
  },
  send(){
    const lt=document.getElementById('ch7-lt').value.trim();sfx.reveal();G.addAw(5);
    const pg=G._mkPage(CHAPS[6].bg);
    const msg=lt?'谢谢你的真诚。这封信里的每一个字，都是"你"写的 -- 不是AI，不是算法，是你自己的思考。这种能力，永远不要放弃。':'你没有写。也许现在不知道说什么，这没关系。重要的是你停下来想了想。';
    pg.content.innerHTML=`<div class="reflection-box">${msg}</div>${G.navHtml('查看结局 &rarr;','G.ending()')}`;
    G.go(pg.id);
  },
};

  const on=sfx.toggle();
  document.getElementById('soundToggle').textContent=on?'SND':'OFF';
  document.getElementById('soundToggle').style.color=on?'#94a3b8':'#ef4444';
};

document.getElementById('bgmVolume').oninput=e=>sfx.setVol('bgm',e.target.value/100);

// Particles
(function(){
  const cv=document.getElementById('particles'),cx=cv.getContext('2d');let W,H;
  const ps=[];const N=35;
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}resize();window.addEventListener('resize',resize);
  for(let i=0;i<N;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,a:Math.random()*.4+.1});
  function draw(){cx.clearRect(0,0,W,H);ps.forEach(p=>{cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=`rgba(96,165,250,${p.a})`;cx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0});requestAnimationFrame(draw)}draw();
})();
// Position fixed tooltips on hover
document.addEventListener('mouseover',function(e){
  const term=e.target.closest('.term');
  if(!term)return;
  const tip=term.querySelector('.term-tip');
  if(!tip)return;
  const r=term.getBoundingClientRect();
  let top=r.bottom+8,left=r.left+r.width/2-140;
  if(left<8)left=8;if(left+280>window.innerWidth-8)left=window.innerWidth-288;
  if(top+200>window.innerHeight){top=r.top-8;tip.style.transform='translateY(-100%)';}else{tip.style.transform='none';}
  tip.style.top=top+'px';tip.style.left=left+'px';
});
